# =============================================================================
# Fideon RunPod — Fine-Tuning Config
# QLoRA continuous-learning pipeline for Qwen2-VL-7B (ACORD field extraction)
# Tuned for RunPod H100 SXM (80 GB HBM3).
# Model lives at /workspace/models/qwen2-vl-7b on the RunPod pod.
# =============================================================================

# ── Base model ────────────────────────────────────────────────────────────────
base_model: "${QWEN_MODEL_ID:-/workspace/models/qwen2-vl-7b}"
local_files_only: true

# ── Storage paths (all under /workspace on the pod) ───────────────────────────
paths:
  datasets_dir:  "/workspace/fine_tuning/datasets"
  runs_dir:      "/workspace/fine_tuning/runs"
  registry_path: "/workspace/fine_tuning/registry/version_registry.json"

# ── Continuous learning ───────────────────────────────────────────────────────
continuous_learning:
  enabled: true
  # Number of corrections before a new training cycle is triggered automatically.
  retrain_threshold: 25
  feedback_datasets_dir: "/workspace/fine_tuning/datasets/feedback_learning"

# ── LoRA — H100 allows a larger rank for more expressive adapters ─────────────
# r=16 was sized for 24 GB GPUs; H100 80 GB can comfortably run r=64.
# lora_alpha = 2 * r keeps the effective learning rate stable as rank grows.
lora:
  r: 64
  lora_alpha: 128
  # Full set of Qwen2-VL-7B attention + MLP projection layers
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# ── Training — H100 SXM 80 GB ─────────────────────────────────────────────────
training:
  num_epochs: 3
  # Reduced from 8 to 4 to avoid OOM when Flash Attention 2 is missing.
  per_device_train_batch_size: 4
  # Increased from 1 to 2 to maintain an effective batch size of 8.
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  # 4096-token window fits full multi-page ACORD forms (vs 2048 on smaller GPUs).
  max_seq_length: 4096
  fp16: false
  bf16: true
  # Enabled to reduce VRAM usage since Flash Attention 2 is unavailable.
  gradient_checkpointing: true
  warmup_ratio: 0.10
  logging_steps: 5
  save_strategy: "epoch"
  save_total_limit: 3
  # Standard AdamW — no memory-paged variant needed with 80 GB VRAM.
  optim: "adamw_torch"
  # Fraction of older training data replayed each cycle (anti-forgetting).
  replay_fraction: 0.30

# ── Evaluation / quality gate ─────────────────────────────────────────────────
evaluation:
  # Minimum absolute scores required to pass the gate.
  absolute_floors:
    field_f1: 0.65
    field_recall: 0.60
  # Maximum allowed regression vs parent version before blocking promotion.
  max_regression: 0.05
  # Minimum improvement over parent (set 0 to always promote if floors pass).
  min_improvement: 0.0
  # Maximum drop in recall on parent-version eval set (catastrophic forgetting guard).
  max_forgetting_drop: 0.10
  temperature: 0.0
  max_new_tokens: 512
