name: Deploy – Staging

on:
  workflow_run:
    workflows: ["CI – Lint · Type-check · Test · Build"]
    branches: [develop]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: develop)"
        required: false
        default: "develop"

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/neurapod-web
  AZURE_WEBAPP_NAME: neurapod-web-staging
  AZURE_RESOURCE_GROUP: neurapod-rg
  SLOT_NAME: staging           # Azure deployment slot

defaults:
  run:
    working-directory: neurapod-app

jobs:
  # ── Gate: only deploy if CI passed ───────────────────────────
  check-ci:
    name: Check CI status
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding to staging deploy"

  # ══════════════════════════════════════════════════════════════
  # DEPLOY → STAGING SLOT
  # ══════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: check-ci
    timeout-minutes: 20
    environment:
      name: staging
      url: https://neurapod-staging.azurewebsites.net

    outputs:
      deploy-url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image tag
        id: image
        run: |
          TAG="${{ github.event.inputs.image_tag || 'develop' }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Web App (staging slot)
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name:   ${{ env.AZURE_WEBAPP_NAME }}
          slot-name:  ${{ env.SLOT_NAME }}
          images:     ${{ steps.image.outputs.full }}

      - name: Update App Settings (staging)
        uses: azure/appservice-settings@v1
        with:
          app-name:  ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          app-settings-json: |
            [
              { "name": "NEXT_PUBLIC_SUPABASE_URL",      "value": "${{ secrets.STAGING_SUPABASE_URL }}",      "slotSetting": true },
              { "name": "NEXT_PUBLIC_SUPABASE_ANON_KEY", "value": "${{ secrets.STAGING_SUPABASE_ANON_KEY }}", "slotSetting": true },
              { "name": "SUPABASE_SERVICE_ROLE_KEY",     "value": "${{ secrets.STAGING_SERVICE_ROLE_KEY }}",  "slotSetting": true },
              { "name": "NEXT_PUBLIC_APP_URL",           "value": "https://neurapod-staging.azurewebsites.net", "slotSetting": true },
              { "name": "NODE_ENV",                      "value": "production",                               "slotSetting": true },
              { "name": "WEBSITES_PORT",                 "value": "4200",                                     "slotSetting": false }
            ]

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for staging to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://neurapod-staging.azurewebsites.net/api/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

  # ══════════════════════════════════════════════════════════════
  # SMOKE TESTS against staging
  # ══════════════════════════════════════════════════════════════
  smoke-test-staging:
    name: Smoke Tests – Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci --prefer-offline

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests against staging
        run: npx playwright test --project=chromium tests/smoke.spec.ts
        env:
          PLAYWRIGHT_BASE_URL:  https://neurapod-staging.azurewebsites.net
          TEST_USER_EMAIL:      ${{ secrets.E2E_TEST_EMAIL }}
          TEST_USER_PASSWORD:   ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-staging-report
          path: playwright-report/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # NOTIFY
  # ══════════════════════════════════════════════════════════════
  notify-staging:
    name: Notify staging result
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-test-staging]
    if: always()

    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.smoke-test-staging.result == 'success' && '✅' || '❌' }} *Staging deploy ${{ needs.smoke-test-staging.result }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.smoke-test-staging.result == 'success' && '✅' || '❌' }} *Staging Deploy — ${{ needs.smoke-test-staging.result == 'success' && 'Live' || 'Failed' }}*\n*URL:* <https://neurapod-staging.azurewebsites.net|neurapod-staging>\n*Triggered by:* ${{ github.actor }}\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>*"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
