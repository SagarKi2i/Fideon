name: CI – Lint · Type-check · Test · Build

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test suite (emergency only)"
        required: false
        default: false
        type: boolean

# Cancel any in-progress run for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/neurapod-web

defaults:
  run:
    working-directory: neurapod-app

jobs:
  # ══════════════════════════════════════════════════════════════
  # 1. LINT & FORMAT
  # ══════════════════════════════════════════════════════════════
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: Prettier check
        run: npm run format:check

  # ══════════════════════════════════════════════════════════════
  # 2. TYPE CHECK
  # ══════════════════════════════════════════════════════════════
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: tsc --noEmit
        run: npm run typecheck

  # ══════════════════════════════════════════════════════════════
  # 3. UNIT & INTEGRATION TESTS (Vitest)
  # ══════════════════════════════════════════════════════════════
  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    env:
      # Supabase test credentials (test project, isolated schema)
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL:           http://localhost:4200

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: Run Vitest
        run: npm run test:unit -- --coverage --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 14

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the 80% threshold."
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════
  # 4. E2E TESTS (Playwright) – only on PRs and main pushes
  # ══════════════════════════════════════════════════════════════
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL:           http://localhost:4200
      PLAYWRIGHT_BASE_URL:           http://localhost:4200
      TEST_USER_EMAIL:               ${{ secrets.E2E_TEST_EMAIL }}
      TEST_USER_PASSWORD:            ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js server
        run: npm start &
        env:
          PORT: 4200

      - name: Wait for server
        run: npx wait-on http://localhost:4200/api/health --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ══════════════════════════════════════════════════════════════
  # 5. BUILD & PUSH DOCKER IMAGE
  # ══════════════════════════════════════════════════════════════
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck, test-unit]
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag:    ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}
      short-sha:    ${{ steps.short-sha.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch builds: ghcr.io/org/neurapod-web:develop
            type=ref,event=branch
            # PRs: ghcr.io/org/neurapod-web:pr-42
            type=ref,event=pr
            # Semver tags: ghcr.io/org/neurapod-web:1.2.3
            type=semver,pattern={{version}}
            # Short SHA: ghcr.io/org/neurapod-web:sha-abc1234
            type=sha,prefix=sha-,format=short
            # Latest (main only)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./neurapod-app
          file: ./neurapod-app/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.short-sha.outputs.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}

      - name: Generate SBOM (supply chain security)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.short-sha.outputs.sha }}
          path: sbom.spdx.json
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # 6. SECURITY SCAN (Trivy)
  # ══════════════════════════════════════════════════════════════
  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-image
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'

    permissions:
      security-events: write

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-image.outputs.short-sha && format('sha-{0}', needs.build-image.outputs.short-sha) }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1   # Fail on CRITICAL vulnerabilities

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ══════════════════════════════════════════════════════════════
  # 7. NOTIFY (Slack)
  # ══════════════════════════════════════════════════════════════
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, build-image]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Slack failure notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *CI failed on `main`*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *CI Pipeline failed*\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>*"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
