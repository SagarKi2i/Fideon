name: Deploy – Production (Blue/Green)

on:
  # Manual trigger only – production deploys are always intentional
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234, 1.2.3, main)"
        required: true
        default: "main"
      skip_smoke:
        description: "Skip post-swap smoke tests (emergency only)"
        required: false
        default: false
        type: boolean

  # Also triggered by a GitHub Release publish
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # NEVER cancel an in-flight production deploy

env:
  REGISTRY:             ghcr.io
  IMAGE_NAME:           ${{ github.repository_owner }}/neurapod-web
  AZURE_WEBAPP_NAME:    neurapod-web-prod
  AZURE_RESOURCE_GROUP: neurapod-rg
  PROD_URL:             https://app.neurapod.ai
  PRE_SWAP_SLOT:        blue                # "blue" slot receives new image pre-swap

defaults:
  run:
    working-directory: neurapod-app

jobs:
  # ══════════════════════════════════════════════════════════════
  # 1. PRE-FLIGHT CHECKS
  # ══════════════════════════════════════════════════════════════
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production-approval   # Requires manual approval from CODEOWNERS

    steps:
      - name: Log deploy intent
        run: |
          echo "════════════════════════════════════"
          echo "  NeuraPod Production Deploy"
          echo "  Image tag : ${{ github.event.inputs.image_tag || github.event.release.tag_name }}"
          echo "  Triggered : ${{ github.actor }}"
          echo "  Time (UTC): $(date -u)"
          echo "════════════════════════════════════"

      - name: Verify image exists in registry
        run: |
          TAG="${{ github.event.inputs.image_tag || github.event.release.tag_name }}"
          FULL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          docker manifest inspect "$FULL" > /dev/null 2>&1 \
            && echo "✅ Image verified: $FULL" \
            || (echo "❌ Image not found: $FULL" && exit 1)

  # ══════════════════════════════════════════════════════════════
  # 2. DEPLOY TO BLUE SLOT (warm-up – traffic still on green)
  # ══════════════════════════════════════════════════════════════
  deploy-blue:
    name: Deploy to Blue slot (pre-swap)
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve image tag
        id: image
        run: |
          TAG="${{ github.event.inputs.image_tag || github.event.release.tag_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

      - name: Save current production image tag (rollback reference)
        id: rollback-ref
        run: |
          CURRENT=$(az webapp config container show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --slot production \
            --query "properties.DOCKER_CUSTOM_IMAGE_NAME" \
            --output tsv 2>/dev/null || echo "unknown")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Rollback ref: $CURRENT"

      - name: Deploy new image to blue slot
        uses: azure/webapps-deploy@v3
        with:
          app-name:  ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.PRE_SWAP_SLOT }}
          images:    ${{ steps.image.outputs.full }}

      - name: Update App Settings (blue slot – production values)
        uses: azure/appservice-settings@v1
        with:
          app-name:  ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.PRE_SWAP_SLOT }}
          app-settings-json: |
            [
              { "name": "NEXT_PUBLIC_SUPABASE_URL",      "value": "${{ secrets.PROD_SUPABASE_URL }}",      "slotSetting": true },
              { "name": "NEXT_PUBLIC_SUPABASE_ANON_KEY", "value": "${{ secrets.PROD_SUPABASE_ANON_KEY }}", "slotSetting": true },
              { "name": "SUPABASE_SERVICE_ROLE_KEY",     "value": "${{ secrets.PROD_SERVICE_ROLE_KEY }}",  "slotSetting": true },
              { "name": "NEXT_PUBLIC_APP_URL",           "value": "${{ env.PROD_URL }}",                   "slotSetting": false },
              { "name": "NODE_ENV",                      "value": "production",                            "slotSetting": false },
              { "name": "WEBSITES_PORT",                 "value": "4200",                                  "slotSetting": false }
            ]

      - name: Wait for blue slot to be healthy
        run: |
          BLUE_URL="https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.PRE_SWAP_SLOT }}.azurewebsites.net"
          echo "Blue slot URL: $BLUE_URL"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BLUE_URL/api/health")
            echo "Attempt $i/18: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Blue slot is healthy — ready to swap"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Blue slot failed health check after 3 minutes — aborting swap"
          exit 1

      - name: Store rollback info as output
        id: store-rollback
        run: echo "rollback-tag=${{ steps.rollback-ref.outputs.current }}" >> $GITHUB_OUTPUT

    outputs:
      rollback-tag: ${{ steps.store-rollback.outputs.rollback-tag }}
      image-full:   ${{ steps.image.outputs.full }}

  # ══════════════════════════════════════════════════════════════
  # 3. SLOT SWAP → PRODUCTION (zero-downtime)
  # ══════════════════════════════════════════════════════════════
  swap-to-production:
    name: Slot swap → Production
    runs-on: ubuntu-latest
    needs: deploy-blue
    timeout-minutes: 15

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap blue ↔ production slots
        run: |
          echo "🔄 Swapping blue → production..."
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --slot ${{ env.PRE_SWAP_SLOT }} \
            --target-slot production
          echo "✅ Slot swap complete"

      - name: Verify production health post-swap
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PROD_URL }}/api/health")
            echo "Attempt $i/12: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production is healthy post-swap"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Production health check failed — initiating rollback"
          exit 1

      - name: ROLLBACK on health-check failure
        if: failure()
        run: |
          echo "🔁 Rolling back — swapping production ↔ blue..."
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --slot production \
            --target-slot ${{ env.PRE_SWAP_SLOT }}
          echo "✅ Rollback complete — previous version restored"

  # ══════════════════════════════════════════════════════════════
  # 4. POST-SWAP SMOKE TESTS
  # ══════════════════════════════════════════════════════════════
  smoke-test-prod:
    name: Smoke Tests – Production
    runs-on: ubuntu-latest
    needs: swap-to-production
    timeout-minutes: 15
    if: ${{ github.event.inputs.skip_smoke != 'true' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci --prefer-offline

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run production smoke tests
        run: npx playwright test --project=chromium tests/smoke.spec.ts
        env:
          PLAYWRIGHT_BASE_URL:  ${{ env.PROD_URL }}
          TEST_USER_EMAIL:      ${{ secrets.E2E_TEST_EMAIL }}
          TEST_USER_PASSWORD:   ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-prod-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: ROLLBACK if smoke tests fail
        if: failure()
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Execute rollback
        if: failure()
        run: |
          echo "🔁 Smoke tests failed — rolling back production..."
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --slot production \
            --target-slot ${{ env.PRE_SWAP_SLOT }}
          echo "✅ Rollback complete"

  # ══════════════════════════════════════════════════════════════
  # 5. TAG GIT COMMIT & CREATE GITHUB RELEASE
  # ══════════════════════════════════════════════════════════════
  tag-release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [swap-to-production, smoke-test-prod]
    if: github.event_name == 'workflow_dispatch' && success()

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag commit with deploy timestamp
        run: |
          TAG="deploy-$(date -u +%Y%m%d-%H%M)-${{ github.event.inputs.image_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Production deploy: ${{ github.event.inputs.image_tag }} by ${{ github.actor }}"
          git push origin "$TAG"
          echo "Tagged: $TAG"

  # ══════════════════════════════════════════════════════════════
  # 6. NOTIFY
  # ══════════════════════════════════════════════════════════════
  notify-production:
    name: Notify production result
    runs-on: ubuntu-latest
    needs: [swap-to-production, smoke-test-prod]
    if: always()

    steps:
      - name: Slack production notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.smoke-test-prod.result == 'success' && '🚀' || '🔁' }} *Production deploy ${{ needs.smoke-test-prod.result == 'success' && 'succeeded' || 'ROLLED BACK' }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.smoke-test-prod.result == 'success' && '🚀' || '🔁' }} *Production Deploy — ${{ needs.smoke-test-prod.result == 'success' && 'Live' || 'ROLLED BACK' }}*\n*Image:* `${{ github.event.inputs.image_tag || github.event.release.tag_name }}`\n*URL:* <${{ env.PROD_URL }}|app.neurapod.ai>\n*Deployed by:* ${{ github.actor }}\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>*"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
