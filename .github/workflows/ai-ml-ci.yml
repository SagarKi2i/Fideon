name: AI-ML Docker Build & Push

on:
  push:
    branches:
      - 'v*-dev'
      - 'v*-staging'
      - 'v1'
    paths:
      - 'ai-ml/**'
      - '.github/workflows/ai-ml-ci.yml'

  workflow_dispatch:

concurrency:
  group: ai-ml-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: >
          (github.event_name == 'pull_request' && github.base_ref == 'v1-dev') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/v1-dev')
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ai-ml

      - name: Build Docker Image
        if: >
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            -t neurapodacr.azurecr.io/fideon-ai-ml:${{ github.sha }} \
            -t neurapodacr.azurecr.io/fideon-ai-ml:latest \
            ./ai-ml

      - name: Login to ACR & Push
        if: |
          (github.event_name == 'push' && (
            github.ref == 'refs/heads/v1-dev' ||
            github.ref == 'refs/heads/v1-staging' ||
            github.ref == 'refs/heads/v1'
          )) ||
          github.event_name == 'workflow_dispatch'
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin

          docker push neurapodacr.azurecr.io/fideon-ai-ml:${{ github.sha }}
          docker push neurapodacr.azurecr.io/fideon-ai-ml:latest
          echo "Pushed neurapodacr.azurecr.io/fideon-ai-ml:${{ github.sha }}"
