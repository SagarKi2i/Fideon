# Reusable deploy to Azure App Service using publish profiles.
# Configure per GitHub Environment (development/staging/production):
# - Variables: AZURE_WEBAPP_FRONTEND, AZURE_WEBAPP_BACKEND,
#              AZURE_HEALTH_URL_FRONTEND (optional), AZURE_HEALTH_URL_BACKEND (optional)
# - Secrets: AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND, AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      acr_login_server:
        required: false
        type: string
        default: 'neurapodacr.azurecr.io'
    secrets:
      AZURE_CR_USERNAME:
        required: true
      AZURE_CR_PASSWORD:
        required: true
      AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND:
        required: true
      AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - environment configuration
        shell: bash
        env:
          APP_FE: ${{ vars.AZURE_WEBAPP_FRONTEND }}
          APP_BE: ${{ vars.AZURE_WEBAPP_BACKEND }}
        run: |
          missing=""
          [ -z "$APP_FE" ] && missing="$missing AZURE_WEBAPP_FRONTEND"
          [ -z "$APP_BE" ] && missing="$missing AZURE_WEBAPP_BACKEND"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required environment variables:$missing"
            echo "Set these in GitHub -> Settings -> Environments -> ${{ inputs.environment }} -> Variables"
            exit 1
          fi

      - name: Resolve App Service target
        id: target
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
        run: |
          if [ "$COMPONENT" = "frontend" ]; then
            APP="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            HEALTH_URL="${{ vars.AZURE_HEALTH_URL_FRONTEND }}"
          else
            APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
            HEALTH_URL="${{ vars.AZURE_HEALTH_URL_BACKEND }}"
          fi

          if [ -z "$HEALTH_URL" ]; then
            if [ "$COMPONENT" = "frontend" ]; then
              HEALTH_URL="https://${APP}.azurewebsites.net/"
            else
              HEALTH_URL="https://${APP}.azurewebsites.net/health"
            fi
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy container to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.target.outputs.app }}
          publish-profile: ${{ inputs.component == 'frontend' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: ${{ inputs.acr_login_server }}/${{ inputs.component }}:${{ inputs.image_sha }}

      - name: Health check
        shell: bash
        run: |
          URL="${{ steps.target.outputs.health_url }}"

          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 15 "$URL" > /dev/null 2>&1; then
              echo "Healthy: $URL"
              exit 0
            fi
            echo "Health check failed ($i/6), retrying in 10s..."
            sleep 10
          done

          echo "ERROR: Health check failed for $URL"
          exit 1
