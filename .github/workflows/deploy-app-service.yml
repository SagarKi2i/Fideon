# Reusable deploy to Azure App Service (Linux single container from ACR).
# Uses Azure CLI after RBAC login — does NOT use publish profile or Kudu /diagnostics/runtime
# (avoids "Failed to get app runtime OS" when SCM/Kudu is broken or blocked).
#
# Per GitHub Environment (e.g. development):
# - Variables: AZURE_WEBAPP_FRONTEND, AZURE_WEBAPP_BACKEND, AZURE_RESOURCE_GROUP
#              AZURE_HEALTH_URL_FRONTEND (optional), AZURE_HEALTH_URL_BACKEND (optional)
# - Secrets: AZURE_CREDENTIALS (service principal JSON), AZURE_CR_USERNAME, AZURE_CR_PASSWORD

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      acr_login_server:
        required: false
        type: string
        default: 'neurapodacr.azurecr.io'
    secrets:
      AZURE_CR_USERNAME:
        required: true
      AZURE_CR_PASSWORD:
        required: true
      AZURE_CREDENTIALS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - environment configuration
        shell: bash
        env:
          APP_FE: ${{ vars.AZURE_WEBAPP_FRONTEND }}
          APP_BE: ${{ vars.AZURE_WEBAPP_BACKEND }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          missing=""
          [ -z "$APP_FE" ] && missing="$missing AZURE_WEBAPP_FRONTEND"
          [ -z "$APP_BE" ] && missing="$missing AZURE_WEBAPP_BACKEND"
          [ -z "$RG" ] && missing="$missing AZURE_RESOURCE_GROUP"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required environment variables:$missing"
            echo "Set these in GitHub -> Settings -> Environments -> ${{ inputs.environment }} -> Variables"
            exit 1
          fi

      - name: Resolve App Service target
        id: target
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
        run: |
          if [ "$COMPONENT" = "frontend" ]; then
            APP="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            HEALTH_URL="${{ vars.AZURE_HEALTH_URL_FRONTEND }}"
          else
            APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
            HEALTH_URL="${{ vars.AZURE_HEALTH_URL_BACKEND }}"
          fi

          if [ -z "$HEALTH_URL" ]; then
            if [ "$COMPONENT" = "frontend" ]; then
              HEALTH_URL="https://${APP}.azurewebsites.net/"
            else
              HEALTH_URL="https://${APP}.azurewebsites.net/health"
            fi
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container (Azure CLI — no Kudu)
        uses: azure/cli@v2
        with:
          azcliversion: agentazcliversion
          inlineScript: |
            set -e
            APP="${{ steps.target.outputs.app }}"
            RG="${{ vars.AZURE_RESOURCE_GROUP }}"
            IMAGE="${{ inputs.acr_login_server }}/${{ inputs.component }}:${{ inputs.image_sha }}"
            REG_URL="https://${{ inputs.acr_login_server }}"
            echo "Setting container image: $IMAGE"
            az webapp config container set \
              --name "$APP" \
              --resource-group "$RG" \
              --container-image-name "$IMAGE" \
              --container-registry-url "$REG_URL" \
              --container-registry-user "${{ secrets.AZURE_CR_USERNAME }}" \
              --container-registry-password "${{ secrets.AZURE_CR_PASSWORD }}"
            echo "Restarting web app..."
            az webapp restart --name "$APP" --resource-group "$RG"

      - name: Health check
        shell: bash
        run: |
          URL="${{ steps.target.outputs.health_url }}"

          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 15 "$URL" > /dev/null 2>&1; then
              echo "Healthy: $URL"
              exit 0
            fi
            echo "Health check failed ($i/6), retrying in 10s..."
            sleep 10
          done

          echo "ERROR: Health check failed for $URL"
          exit 1
