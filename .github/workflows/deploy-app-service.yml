# Reusable deploy to Azure App Service (Linux single container from ACR).
# Uses Azure CLI after RBAC login — does NOT use publish profile or Kudu /diagnostics/runtime
# (avoids "Failed to get app runtime OS" when SCM/Kudu is broken or blocked).
#
# Per GitHub Environment (e.g. development):
# - Variables: AZURE_SUBSCRIPTION_ID, AZURE_WEBAPP_FRONTEND, AZURE_WEBAPP_BACKEND, AZURE_RESOURCE_GROUP
#              AZURE_HEALTH_URL_* (optional), CORS_ALLOWED_ORIGINS (optional; backend — synced to Azure)
# - Secrets: AZURE_CREDENTIALS, AZURE_CR_USERNAME, AZURE_CR_PASSWORD
# - Frontend deploy syncs (Environment secrets → App Service): NEXT_PUBLIC_SUPABASE_URL,
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY (or NEXT_PUBLIC_SUPABASE_ANON_KEY), NEXT_PUBLIC_API_URL
#   (optional; defaults to https://<AZURE_WEBAPP_BACKEND>.azurewebsites.net when unset)
# - Backend deploy also requires (Environment secrets — copied into the App Service each deploy):
#     DEVICE_JWT_SECRET, SUPABASE_SERVICE_ROLE_KEY, and either SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL
#     SUPABASE_ANON_KEY (optional; falls back to NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY / NEXT_PUBLIC_SUPABASE_ANON_KEY)
#   GitHub secrets are NOT visible to the container unless this workflow applies them here.
#
# If login fails with "No subscriptions found", the SP has no role on that subscription — see
# .github/DEPLOY-TROUBLESHOOTING.md ("Azure Login: No subscriptions found").
#
# azure/login@v2: do not pass subscription-id (or client-id/tenant-id) together with creds — the
# action ignores creds and then requires separate client-id/tenant-id/client-secret.
# Note: no-op update to trigger fresh CI/CD runs.

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      acr_login_server:
        required: false
        type: string
        default: 'neurapodacr.azurecr.io'
    secrets:
      AZURE_CR_USERNAME:
        required: true
      AZURE_CR_PASSWORD:
        required: true
      AZURE_CREDENTIALS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - environment configuration
        shell: bash
        env:
          SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          APP_FE: ${{ vars.AZURE_WEBAPP_FRONTEND }}
          APP_BE: ${{ vars.AZURE_WEBAPP_BACKEND }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          missing=""
          [ -z "$SUB" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
          [ -z "$APP_FE" ] && missing="$missing AZURE_WEBAPP_FRONTEND"
          [ -z "$APP_BE" ] && missing="$missing AZURE_WEBAPP_BACKEND"
          [ -z "$RG" ] && missing="$missing AZURE_RESOURCE_GROUP"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required environment variables:$missing"
            echo "Set these in GitHub -> Settings -> Environments -> ${{ inputs.environment }} -> Variables"
            exit 1
          fi

      - name: Resolve App Service target
        id: target
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
          HEALTH_URL_FE: ${{ vars.AZURE_HEALTH_URL_FRONTEND }}
          HEALTH_URL_BE: ${{ vars.AZURE_HEALTH_URL_BACKEND }}
        run: |
          if [ "$COMPONENT" = "frontend" ]; then
            APP="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            CUSTOM_HEALTH="$HEALTH_URL_FE"
            DEFAULT_HEALTH="https://${APP}.azurewebsites.net/"
          else
            APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
            CUSTOM_HEALTH="$HEALTH_URL_BE"
            DEFAULT_HEALTH="https://${APP}.azurewebsites.net/health"
          fi

          if [ -n "$CUSTOM_HEALTH" ]; then
            HEALTH_URL="$CUSTOM_HEALTH"
          else
            HEALTH_URL="$DEFAULT_HEALTH"
          fi

          # Log line must not use env-injected probe URL (GitHub masks it when it matches a secret).
          # Reconstruct from app name (Environment variable, not a secret) whenever probe matches default pattern.
          # Normalize trailing slashes so AZURE_HEALTH_URL_* can match the computed default.
          strip_slash() {
            echo "$1" | sed 's|/*$||'
          }
          H_NORM=$(strip_slash "$HEALTH_URL")
          D_NORM=$(strip_slash "$DEFAULT_HEALTH")

          DISPLAY_AS_DEFAULT="false"
          if [ -z "$CUSTOM_HEALTH" ]; then
            DISPLAY_AS_DEFAULT="true"
          elif [ "$H_NORM" = "$D_NORM" ]; then
            DISPLAY_AS_DEFAULT="true"
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"
          echo "health_display_as_default=$DISPLAY_AS_DEFAULT" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        env:
          # Avoid MSAL cache incompatibilities inside azure/cli container by using
          # a fresh Azure config dir per workflow run.
          AZURE_CONFIG_DIR: ${{ runner.temp }}/azure-config
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure preflight - subscription access
        shell: bash
        env:
          SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -e
          SUB_TRIM="$(echo "${SUB:-}" | tr -d '[:space:]')"
          if [ -z "$SUB_TRIM" ]; then
            echo "::error::AZURE_SUBSCRIPTION_ID is empty (Environment variable). Set it in GitHub -> Environments -> ${{ inputs.environment }} -> Variables."
            exit 1
          fi
          echo "Checking Azure subscription access for subscriptionId=$SUB_TRIM"
          # If the SP has no subscription access, this will be empty.
          IDS="$(az account list --query "[].id" -o tsv 2>/dev/null || true)"
          if [ -z "$IDS" ]; then
            echo "::error::Azure login succeeded but returned zero subscriptions. The service principal likely has no RBAC role assignment on the subscription."
            exit 1
          fi
          if ! echo "$IDS" | tr '\t' '\n' | grep -qx "$SUB_TRIM"; then
            echo "::error::Configured AZURE_SUBSCRIPTION_ID is not accessible to this service principal."
            echo "Available subscription IDs (from az account list):"
            echo "$IDS" | tr '\t' '\n'
            exit 1
          fi
          az account set --subscription "$SUB_TRIM"

      - name: Deploy container (Azure CLI — no Kudu)
        shell: bash
        env:
          AZURE_CONFIG_DIR: ${{ runner.temp }}/azure-config
        run: |
          set -e
          mkdir -p "${AZURE_CONFIG_DIR:-$HOME/.azure}"
          az account set --subscription "$(echo "${{ vars.AZURE_SUBSCRIPTION_ID }}" | tr -d '[:space:]')"
          APP="${{ steps.target.outputs.app }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          IMAGE="${{ inputs.acr_login_server }}/${{ inputs.component }}:${{ inputs.image_sha }}"
          REG_URL="https://${{ inputs.acr_login_server }}"
          echo "Setting container image: $IMAGE"
          az webapp config container set \
            --name "$APP" \
            --resource-group "$RG" \
            --container-image-name "$IMAGE" \
            --container-registry-url "$REG_URL" \
            --container-registry-user "${{ secrets.AZURE_CR_USERNAME }}" \
            --container-registry-password "${{ secrets.AZURE_CR_PASSWORD }}"

      - name: App Service settings & restart
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
          APP: ${{ steps.target.outputs.app }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          DEVICE_JWT_SECRET: ${{ secrets.DEVICE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          # AI/runtime provider and orchestration configuration (optional by design).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL_CHAT: ${{ secrets.GROQ_MODEL_CHAT }}
          GROQ_MODEL_HELP: ${{ secrets.GROQ_MODEL_HELP }}
          GROQ_MODEL_WORKFLOW: ${{ secrets.GROQ_MODEL_WORKFLOW }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          FIDEON_SECRET_KEY: ${{ secrets.FIDEON_SECRET_KEY }}
          RUNPOD_OPENAI_COMPAT_URL: ${{ secrets.RUNPOD_OPENAI_COMPAT_URL }}
          RUNPOD_GENERATE_URL: ${{ secrets.RUNPOD_GENERATE_URL }}
          RUNPOD_MODEL_LLAMA: ${{ secrets.RUNPOD_MODEL_LLAMA }}
          RUNPOD_MODEL_MISTRAL: ${{ secrets.RUNPOD_MODEL_MISTRAL }}
          RUNPOD_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          RUNPOD_PROXY_BASE_URL: ${{ secrets.RUNPOD_PROXY_BASE_URL }}
          RUNPOD_SSH_HOST: ${{ secrets.RUNPOD_SSH_HOST }}
          RUNPOD_SSH_USER: ${{ secrets.RUNPOD_SSH_USER }}
          RUNPOD_SSH_PORT: ${{ secrets.RUNPOD_SSH_PORT }}
          RUNPOD_SSH_KEY_PATH: ${{ secrets.RUNPOD_SSH_KEY_PATH }}
          RUNPOD_SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
          RUNPOD_REMOTE_START_SCRIPT: ${{ secrets.RUNPOD_REMOTE_START_SCRIPT }}
          RUNPOD_SSH_ENABLED: ${{ secrets.RUNPOD_SSH_ENABLED }}
          OFFLINE_LLM_FALLBACK_ENABLED: ${{ secrets.OFFLINE_LLM_FALLBACK_ENABLED }}
          LLM_CACHE_BACKEND: ${{ secrets.LLM_CACHE_BACKEND }}
          MOMENTO_API_KEY: ${{ secrets.MOMENTO_API_KEY }}
          LLM_SEMANTIC_CACHE_ENABLED: ${{ secrets.LLM_SEMANTIC_CACHE_ENABLED }}
          PERSONAL_API_KEY_PEPPER: ${{ secrets.PERSONAL_API_KEY_PEPPER }}
        run: |
          set -e
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

          if [ "$COMPONENT" = "frontend" ]; then
            FE_SETTINGS=(WEBSITES_PORT=3000)
            SUPABASE_CLIENT_KEY="${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-$NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ]; then
              FE_SETTINGS+=("NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}")
            fi
            if [ -n "$SUPABASE_CLIENT_KEY" ]; then
              FE_SETTINGS+=("NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_CLIENT_KEY}")
            fi
            API_URL="${NEXT_PUBLIC_API_URL}"
            if [ -z "$API_URL" ]; then
              BE_APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
              if [ -n "$BE_APP" ]; then
                API_URL="https://${BE_APP}.azurewebsites.net"
              fi
            fi
            if [ -n "$API_URL" ]; then
              FE_SETTINGS+=("NEXT_PUBLIC_API_URL=${API_URL}")
            fi
            if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_CLIENT_KEY" ]; then
              echo "::warning::Frontend: set NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY or NEXT_PUBLIC_SUPABASE_ANON_KEY on the GitHub Environment so the App Service has Supabase client config at runtime."
            fi
            az webapp config appsettings set \
              --name "$APP" \
              --resource-group "$RG" \
              --settings "${FE_SETTINGS[@]}"
            az webapp restart --name "$APP" --resource-group "$RG"
            exit 0
          fi

          # Backend: runtime env must exist on the Web App (GitHub secrets alone are not enough).
          if [ -z "$DEVICE_JWT_SECRET" ]; then
            echo "::error::Add Environment secret DEVICE_JWT_SECRET (development) — required for API startup. It will be synced to Azure each deploy."
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            if [ -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" ]; then
              SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
            elif [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
              SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
            fi
          fi

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Backend deploy needs SUPABASE_SERVICE_ROLE_KEY and a Supabase project URL (set SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL on the GitHub Environment)."
            exit 1
          fi

          SETTINGS=(WEBSITES_PORT=8080)
          SETTINGS+=("DEVICE_JWT_SECRET=${DEVICE_JWT_SECRET}")
          SETTINGS+=("SUPABASE_URL=${SUPABASE_URL}")
          SETTINGS+=("SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}")
          if [ -n "$SUPABASE_ANON_KEY" ]; then
            SETTINGS+=("SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}")
          fi
          if [ -n "$CORS_ALLOWED_ORIGINS" ]; then
            SETTINGS+=("CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}")
          else
            FE_APP="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            if [ -n "$FE_APP" ]; then
              SETTINGS+=("CORS_ALLOWED_ORIGINS=https://${FE_APP}.azurewebsites.net,http://localhost:3000,http://localhost:3003")
            fi
          fi

          # Sync optional AI settings if present in the environment secrets.
          # This keeps current behavior intact while enabling AI runtime in production/staging/dev.
          for key in \
            OPENAI_API_KEY OPENAI_MODEL \
            GROQ_API_KEY GROQ_MODEL_CHAT GROQ_MODEL_HELP GROQ_MODEL_WORKFLOW \
            GEMINI_API_KEY GEMINI_MODEL \
            ANTHROPIC_API_KEY CLAUDE_MODEL \
            HUGGINGFACE_API_KEY \
            RUNPOD_API_KEY FIDEON_SECRET_KEY RUNPOD_OPENAI_COMPAT_URL RUNPOD_GENERATE_URL \
            RUNPOD_MODEL_LLAMA RUNPOD_MODEL_MISTRAL RUNPOD_POD_ID RUNPOD_PROXY_BASE_URL \
            RUNPOD_SSH_HOST RUNPOD_SSH_USER RUNPOD_SSH_PORT RUNPOD_SSH_KEY_PATH RUNPOD_SSH_PRIVATE_KEY \
            RUNPOD_REMOTE_START_SCRIPT RUNPOD_SSH_ENABLED OFFLINE_LLM_FALLBACK_ENABLED \
            LLM_CACHE_BACKEND MOMENTO_API_KEY LLM_SEMANTIC_CACHE_ENABLED PERSONAL_API_KEY_PEPPER
          do
            value="${!key:-}"
            if [ -n "$value" ]; then
              SETTINGS+=("${key}=${value}")
            fi
          done

          if [ -z "$OPENAI_API_KEY" ] && [ -z "$GROQ_API_KEY" ] && [ -z "$RUNPOD_API_KEY" ] && [ -z "$GEMINI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::No AI provider/orchestrator secrets detected for backend deploy. Core API will run, but AI routes may fail until environment secrets are configured."
          fi

          az webapp config appsettings set \
            --name "$APP" \
            --resource-group "$RG" \
            --settings "${SETTINGS[@]}"
          echo "Restarting backend web app..."
          az webapp restart --name "$APP" --resource-group "$RG"

      - name: Health check
        shell: bash
        env:
          CURL_URL: ${{ steps.target.outputs.health_url }}
          COMPONENT: ${{ inputs.component }}
          TARGET_APP: ${{ steps.target.outputs.app }}
          HEALTH_DISPLAY_AS_DEFAULT: ${{ steps.target.outputs.health_display_as_default }}
        run: |
          if [ -z "$CURL_URL" ]; then
            echo "::error::Health probe URL is empty. Check Environment variables AZURE_WEBAPP_FRONTEND / AZURE_WEBAPP_BACKEND and optional AZURE_HEALTH_URL_*."
            exit 1
          fi
          if [ -z "$TARGET_APP" ]; then
            echo "::error::Resolved App Service name (app output) is empty after preflight — workflow bug or skipped resolve step."
            exit 1
          fi

          # Backend: larger image + gunicorn/spaCy/transformers cold start; allow ample warm-up.
          if [ "$COMPONENT" = "backend" ]; then
            ATTEMPTS=40
            SLEEP_SEC=15
            CURL_MAX=25
          else
            ATTEMPTS=8
            SLEEP_SEC=10
            CURL_MAX=15
          fi
          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -sfSL --max-time "$CURL_MAX" "$CURL_URL" > /dev/null 2>&1; then
              # Build this string in-shell from TARGET_APP only so GitHub does not mask the URL
              # (env CURL_URL is often fully redacted when it matches a registered secret).
              if [ "$HEALTH_DISPLAY_AS_DEFAULT" = "true" ]; then
                if [ "$COMPONENT" = "frontend" ]; then
                  echo "Healthy: https://${TARGET_APP}.azurewebsites.net/"
                else
                  echo "Healthy: https://${TARGET_APP}.azurewebsites.net/health"
                fi
              else
                echo "Healthy: probe succeeded (custom AZURE_HEALTH_URL_* — URL omitted from logs to avoid secret masking) webapp=${TARGET_APP}"
              fi
              exit 0
            fi
            echo "Health check failed ($i/$ATTEMPTS) webapp=${TARGET_APP}, retrying in ${SLEEP_SEC}s..."
            if [ "$i" -lt "$ATTEMPTS" ]; then
              sleep "$SLEEP_SEC"
            fi
          done

          # One non-fatal diagnostic (no -f): surface HTTP code or 000 if TCP/ TLS failed
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time "$CURL_MAX" "$CURL_URL" 2>/dev/null)
          if [ -z "$HTTP_CODE" ]; then
            HTTP_CODE="000"
          fi
          echo "::error::Health check exhausted retries. Last HTTP status: ${HTTP_CODE} (000 = no response — container down, wrong port, or still starting). webapp=${TARGET_APP} component=${COMPONENT}"
          if [ "$COMPONENT" = "backend" ]; then
            echo "Hints: Azure Portal → App Service → Log stream / Container logs. Confirm WEBSITES_PORT=8080 and required app settings (DEVICE_JWT_SECRET, SUPABASE_*). Default probe is GET /health."
          else
            echo "Hints: Confirm WEBSITES_PORT=3000, image listens on 3000, and NEXT_PUBLIC_* synced from GitHub Environment if the app needs them at runtime."
          fi
          exit 1

      - name: Backend deploy diagnostics (on failure)
        if: failure() && inputs.component == 'backend'
        shell: bash
        env:
          APP: ${{ steps.target.outputs.app }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set +e
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          echo "=== Web app state ==="
          az webapp show --name "$APP" --resource-group "$RG" --query "{state:state, defaultHostName:defaultHostName, linuxFxVersion:siteConfig.linuxFxVersion}" -o table

          echo "=== Runtime app settings presence ==="
          az webapp config appsettings list --name "$APP" --resource-group "$RG" \
            --query "[?name=='WEBSITES_PORT' || name=='DEVICE_JWT_SECRET' || name=='SUPABASE_URL' || name=='SUPABASE_SERVICE_ROLE_KEY' || name=='SUPABASE_ANON_KEY' || name=='CORS_ALLOWED_ORIGINS'].{name:name,hasValue:value != null && value != ''}" -o table

          echo "=== Enable container logging (best effort; needed for tail) ==="
          az webapp log config \
            --name "$APP" \
            --resource-group "$RG" \
            --docker-container-logging filesystem \
            --level information \
            2>/dev/null || true

          echo "=== Container logs (best effort) ==="
          timeout 45s az webapp log tail --name "$APP" --resource-group "$RG" || true
