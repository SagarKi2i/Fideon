# Reusable deploy to Azure App Service.
# Configure per GitHub Environment (development/staging/production):
# - Variables: AZURE_WEBAPP_FRONTEND, AZURE_WEBAPP_BACKEND,
#              AZURE_HEALTH_URL_FRONTEND (optional), AZURE_HEALTH_URL_BACKEND (optional)
# - Optional: AZURE_RESOURCE_GROUP (required when using RBAC deploy below)
#
# Auth (pick one):
# A) Publish profile (default): secrets AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND / _BACKEND
#    Hits Kudu /diagnostics/runtime first; fails with "Failed to get app runtime OS" if SCM is down
#    or blocked. Mitigation: WEBSITE_WEBDEPLOY_USE_SCM=true, fresh profile, SCM networking — see
#    .github/DEPLOY-TROUBLESHOOTING.md
# B) Azure RBAC (recommended when Kudu fails): set Environment variable APPSERVICE_USE_AZURE_LOGIN=true,
#    AZURE_RESOURCE_GROUP, and secret AZURE_CREDENTIALS (service principal JSON). Deploy omits
#    publish-profile so webapps-deploy uses ARM instead of Kudu.

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      acr_login_server:
        required: false
        type: string
        default: 'neurapodacr.azurecr.io'
    secrets:
      AZURE_CR_USERNAME:
        required: true
      AZURE_CR_PASSWORD:
        required: true
      AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND:
        required: false
      AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND:
        required: false
      AZURE_CREDENTIALS:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - environment configuration
        shell: bash
        env:
          APP_FE: ${{ vars.AZURE_WEBAPP_FRONTEND }}
          APP_BE: ${{ vars.AZURE_WEBAPP_BACKEND }}
        run: |
          missing=""
          [ -z "$APP_FE" ] && missing="$missing AZURE_WEBAPP_FRONTEND"
          [ -z "$APP_BE" ] && missing="$missing AZURE_WEBAPP_BACKEND"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required environment variables:$missing"
            echo "Set these in GitHub -> Settings -> Environments -> ${{ inputs.environment }} -> Variables"
            exit 1
          fi

      - name: Resolve App Service target
        id: target
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
        run: |
          if [ "$COMPONENT" = "frontend" ]; then
            APP="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            HEALTH_URL="${{ vars.AZURE_HEALTH_URL_FRONTEND }}"
          else
            APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
            HEALTH_URL="${{ vars.AZURE_HEALTH_URL_BACKEND }}"
          fi

          if [ -z "$HEALTH_URL" ]; then
            if [ "$COMPONENT" = "frontend" ]; then
              HEALTH_URL="https://${APP}.azurewebsites.net/"
            else
              HEALTH_URL="https://${APP}.azurewebsites.net/health"
            fi
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"

      - name: Preflight - deploy credentials
        shell: bash
        env:
          USE_LOGIN: ${{ vars.APPSERVICE_USE_AZURE_LOGIN }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          COMPONENT: ${{ inputs.component }}
          PP_FE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          PP_BE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
        run: |
          if [ "$USE_LOGIN" = "true" ]; then
            if [ -z "$RG" ]; then
              echo "ERROR: Set Environment variable AZURE_RESOURCE_GROUP when APPSERVICE_USE_AZURE_LOGIN=true"
              exit 1
            fi
            echo "App Service deploy: Azure Login (RBAC) — publish profile / Kudu runtime probe skipped."
            exit 0
          fi
          if [ "$COMPONENT" = "frontend" ]; then
            if [ -z "$PP_FE" ]; then
              echo "ERROR: Missing AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND, or set APPSERVICE_USE_AZURE_LOGIN=true with AZURE_CREDENTIALS"
              exit 1
            fi
          else
            if [ -z "$PP_BE" ]; then
              echo "ERROR: Missing AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND, or set APPSERVICE_USE_AZURE_LOGIN=true with AZURE_CREDENTIALS"
              exit 1
            fi
          fi

      - name: Azure Login
        if: ${{ vars.APPSERVICE_USE_AZURE_LOGIN == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container (Azure RBAC)
        if: ${{ vars.APPSERVICE_USE_AZURE_LOGIN == 'true' }}
        uses: azure/webapps-deploy@v3.0.7
        with:
          app-name: ${{ steps.target.outputs.app }}
          resource-group-name: ${{ vars.AZURE_RESOURCE_GROUP }}
          images: ${{ inputs.acr_login_server }}/${{ inputs.component }}:${{ inputs.image_sha }}

      - name: Deploy container (publish profile)
        if: ${{ vars.APPSERVICE_USE_AZURE_LOGIN != 'true' }}
        uses: azure/webapps-deploy@v3.0.7
        with:
          app-name: ${{ steps.target.outputs.app }}
          resource-group-name: ${{ vars.AZURE_RESOURCE_GROUP }}
          publish-profile: ${{ inputs.component == 'frontend' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: ${{ inputs.acr_login_server }}/${{ inputs.component }}:${{ inputs.image_sha }}

      - name: Health check
        shell: bash
        run: |
          URL="${{ steps.target.outputs.health_url }}"

          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 15 "$URL" > /dev/null 2>&1; then
              echo "Healthy: $URL"
              exit 0
            fi
            echo "Health check failed ($i/6), retrying in 10s..."
            sleep 10
          done

          echo "ERROR: Health check failed for $URL"
          exit 1
