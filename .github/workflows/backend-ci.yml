# ─────────────────────────────────────────────────────────────
# Backend CI/CD
# ─────────────────────────────────────────────────────────────
# Note: this comment is a no-op change to trigger a clean CI rerun.

name: Backend CI/CD

on:
  push:
    branches:
      - 'v*-dev'
      - 'v*-staging'
      - 'v1'
    paths:
      - 'backend/**'
      - '.github/workflows/**'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ github.ref_name == 'v1' && 'production' || github.ref_name == 'v1-staging' && 'staging' || 'development' }}
    env:
      CI_IMAGE: neurapodacr.azurecr.io/backend-ci:${{ github.sha }}
      BACKEND_IMAGE: neurapodacr.azurecr.io/backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Backend CI Image
        run: |
          docker build \
            -f backend/Dockerfile.ci \
            -t "$CI_IMAGE" \
            backend/

      - name: Lint (inside container)
        continue-on-error: true
        run: |
          docker run --rm --entrypoint /bin/bash "$CI_IMAGE" -lc "
            set -e
            timeout 8m python -m flake8 /app --count --max-line-length=120 --extend-ignore=E501,F401 --exclude=.git,__pycache__,.pytest_cache,.mypy_cache,logs --statistics
          "

      - name: Test (inside container)
        run: |
          docker run --rm --entrypoint /bin/bash "$CI_IMAGE" -lc '
          set -e
          if find /app -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            timeout 12m python -m pytest /app --cov=/app --cov-report=xml
          else
            echo "No test files found — skipping (non-blocking)"
          fi
          '

      - name: SonarQube Scan
        if: >
          (github.event_name == 'pull_request' && github.base_ref == 'v1-dev') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/v1-dev')
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend

      # Quality Gate step intentionally removed for bootstrap:
      # we only need scans to succeed so SonarQube dashboards populate.

      - name: Set up Docker Buildx
        if: |
          github.event_name == 'push' && (
            github.ref == 'refs/heads/v1-dev' ||
            github.ref == 'refs/heads/v1-staging' ||
            github.ref == 'refs/heads/v1'
          )
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        if: |
          github.event_name == 'push' && (
            github.ref == 'refs/heads/v1-dev' ||
            github.ref == 'refs/heads/v1-staging' ||
            github.ref == 'refs/heads/v1'
          )
        uses: docker/login-action@v3
        with:
          registry: neurapodacr.azurecr.io
          username: ${{ secrets.AZURE_CR_USERNAME }}
          password: ${{ secrets.AZURE_CR_PASSWORD }}

      - name: Build & Push Production Backend Image (cached)
        if: |
          github.event_name == 'push' && (
            github.ref == 'refs/heads/v1-dev' ||
            github.ref == 'refs/heads/v1-staging' ||
            github.ref == 'refs/heads/v1'
          )
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: ci
    if: github.ref == 'refs/heads/v1-dev' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: development
      component: backend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/v1-staging' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: staging
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/v1' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: production
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit
