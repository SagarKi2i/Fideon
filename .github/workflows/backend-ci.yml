# ─────────────────────────────────────────────────────────────
# Backend CI/CD
# ─────────────────────────────────────────────────────────────

name: Backend CI/CD

on:
  push:
    branches:
      - 'v*-dev'
      - 'v*-staging'
      - 'v1'
    paths:
      - 'backend/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - 'v*-dev'
      - 'v*-staging'
      - 'v1'
    paths:
      - 'backend/**'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.ref_name == 'v1' && 'production' || github.ref_name == 'v1-staging' && 'staging' || 'development' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint
        working-directory: backend
        continue-on-error: true
        run: flake8 . --count --max-line-length=120 --extend-ignore=E501,F401 --statistics

      - name: Test
        working-directory: backend
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest --cov=. --cov-report=xml
          else
            echo "No test files found — skipping (non-blocking)"
          fi

      - name: SonarQube Scan
        if: github.event_name == 'pull_request' && github.base_ref == 'v1-dev'
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend

      - name: SonarQube Quality Gate
        if: github.event_name == 'pull_request' && github.base_ref == 'v1-dev'
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 15
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Build Docker Image
        if: github.event_name == 'push'
        run: |
          docker build \
            -t neurapodacr.azurecr.io/backend:${{ github.sha }} \
            backend/

      - name: Login to ACR & Push
        if: |
          github.event_name == 'push' && (
            github.ref == 'refs/heads/v1-dev' ||
            github.ref == 'refs/heads/v1-staging' ||
            github.ref == 'refs/heads/v1'
          )
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin

          docker push neurapodacr.azurecr.io/backend:${{ github.sha }}
          echo "Pushed neurapodacr.azurecr.io/backend:${{ github.sha }}"

  deploy-dev:
    needs: ci
    if: github.ref == 'refs/heads/v1-dev' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: development
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/v1-staging' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: staging
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/v1' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: production
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit
