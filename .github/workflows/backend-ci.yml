# ─────────────────────────────────────────────────────────────
# Backend CI/CD
# ─────────────────────────────────────────────────────────────
# Note: this comment is a no-op change to trigger a clean CI rerun.

name: Backend CI/CD

on:
  push:
    branches:
      - 'v*-dev'
      - 'v*-staging'
      - 'v1'
    paths:
      - 'backend/**'
      - '.github/workflows/**'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ github.ref_name == 'v1' && 'production' || github.ref_name == 'v1-staging' && 'staging' || 'development' }}
    env:
      BACKEND_IMAGE: neurapodacr.azurecr.io/backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t "$BACKEND_IMAGE" \
            backend/

      - name: Lint (inside container)
        continue-on-error: true
        run: |
          docker run --rm --entrypoint /bin/bash "$BACKEND_IMAGE" -lc "
            set -e
            python -m pip install --no-cache-dir --user flake8
            python -m flake8 /app --count --max-line-length=120 --extend-ignore=E501,F401 --statistics
          "

      - name: Test (inside container)
        run: |
          docker run --rm --entrypoint /bin/bash "$BACKEND_IMAGE" -lc '
          set -e
          if find /app -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            python -m pip install --no-cache-dir --user pytest pytest-cov
            python -m pytest /app --cov=/app --cov-report=xml
          else
            echo "No test files found — skipping (non-blocking)"
          fi
          '

      - name: SonarQube Scan
        if: >
          (github.event_name == 'pull_request' && github.base_ref == 'v1-dev') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/v1-dev')
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend

      # Quality Gate step intentionally removed for bootstrap:
      # we only need scans to succeed so SonarQube dashboards populate.

      - name: Login to ACR & Push
        if: |
          github.event_name == 'push' && (
            github.ref == 'refs/heads/v1-dev' ||
            github.ref == 'refs/heads/v1-staging' ||
            github.ref == 'refs/heads/v1'
          )
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin

          docker push "$BACKEND_IMAGE"
          echo "Pushed $BACKEND_IMAGE"

  deploy-dev:
    needs: ci
    if: github.ref == 'refs/heads/v1-dev' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: development
      component: backend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/v1-staging' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: staging
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/v1' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: production
      component: backend
      container_name: neurapod-backend
      port: '8080'
      image_sha: ${{ github.sha }}
    secrets: inherit
